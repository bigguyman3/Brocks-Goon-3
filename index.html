<!DOCTYPE html>
<html lang="en">
<head>
<title>Control Nieves68</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; font-family:Arial; background:#000; color:#ff69b4; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(#000, #111); }
  .container { background:rgba(20,20,20,0.9); padding:50px; border-radius:20px; width:500px; text-align:center; box-shadow:0 0 40px #ff1493; }
  h1 { font-size:40px; margin-bottom:20px; color:#ff69b4; text-shadow:0 0 15px #ff1493; }
  textarea { width:100%; padding:16px; font-size:18px; border:1px solid #ff1493; border-radius:8px; background:#222; color:#fff; min-height:120px; resize:vertical; box-sizing:border-box; margin-bottom:20px; }
  button { padding:18px 60px; background:#ff1493; color:#fff; border:none; border-radius:50px; font-size:22px; font-weight:bold; cursor:pointer; box-shadow:0 0 25px #ff69b4; }
  button:hover { background:#c71585; transform:scale(1.05); }
  #status { color:#ffcc00; margin-top:25px; font-size:18px; display:none; }
  .hint { font-size:14px; color:#888; margin-top:40px; }
</style>
</head>
<body>

<div class="container">
  <h1>Control Nieves68</h1>
  <p>Type your command or RP input – it goes straight to Discord</p>

  <textarea id="input" placeholder="Hello world!"></textarea>

  <button onclick="sendToDiscord()">Send to Discord 😈</button>

  <div id="status"></div>

  <div class="hint">Made by Brock</div>
</div>

<script>
const WEBHOOK = "https://discord.com/api/webhooks/1481336443971309740/iGSM5uyhLbbl5JBTI0XyQ8jJA-mUlZc9hoVZsICMHtoE3TGiJHbwJ0qJKbQt3rAi4653"; // the webhook that posts to your RP channel

async function sendToDiscord() {
  const text = document.getElementById("input").value.trim();
  if (!text) return alert("Type something");

  document.getElementById("status").style.display = "block";
  document.getElementById("status").textContent = "Sending to Discord... 🔥";

  try {
    const msg = {
      content: text,
      username: "nieves68", // optional: makes it look like the panel is talking
      avatar_url: "https://i.imgur.com/YourCoolAvatar.png" // optional: add a horny avatar URL
    };

    await fetch(WEBHOOK, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(msg)
    });

    document.getElementById("status").textContent = "Sent! Check Discord 😏";
    document.getElementById("input").value = ""; // clear input

    // Optional: auto-clear status after 3 sec
    setTimeout(() => {
      document.getElementById("status").style.display = "none";
    }, 3000);

  } catch (e) {
    document.getElementById("status").textContent = "Failed... webhook issue 😤";
  }
}

// Enter key support (Shift+Enter for new line, Enter alone to send)
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendToDiscord();
  }
});
</script>
</body>
</html>
